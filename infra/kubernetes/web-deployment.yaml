apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: fl-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: fl-platform/web:milestone
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: fl-platform-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: fl-platform
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
