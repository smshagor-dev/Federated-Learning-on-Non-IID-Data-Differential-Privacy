apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: fl-platform
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: fl_platform
            - name: POSTGRES_USER
              value: fl_platform
            - name: POSTGRES_PASSWORD
              value: fl_platform
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fl-platform
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: fl-platform
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: fl-platform
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
