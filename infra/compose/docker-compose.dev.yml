services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fl_platform
      POSTGRES_USER: fl_platform
      POSTGRES_PASSWORD: fl_platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fl_platform -d fl_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"

  mlflow:
    build:
      context: ../..
      dockerfile: infra/mlflow/Dockerfile
    command: mlflow server --host 0.0.0.0 --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "5000:5000"

  # Milestone 3: the real gRPC coordinator server (cpp/coordinator/main.cpp),
  # built here with apt-installed gRPC/Protobuf since that combination is
  # unavailable on the Windows/MSVC host this repo is otherwise developed
  # on — see infra/docker/cpp-coordinator.Dockerfile and
  # docs/coordinator-runtime.md. Host port is configurable via
  # FL_COORDINATOR_HOST_PORT to avoid clashing with a coordinator/worker
  # already running on the default 50051 outside Compose.
  coordinator:
    build:
      context: ../..
      dockerfile: infra/docker/cpp-coordinator.Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/50051' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${FL_COORDINATOR_HOST_PORT:-50051}:50051"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/go-api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      coordinator:
        condition: service_healthy
    environment:
      FL_COORDINATOR_ADDRESS: coordinator:50051
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "8080:8080"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    depends_on:
      api:
        condition: service_started
    environment:
      FL_API_BASE_URL: http://api:8080
    ports:
      - "3000:3000"

  python-worker:
    build:
      context: ../..
      dockerfile: infra/docker/python-worker.Dockerfile
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      FL_WORKER_COORDINATOR_ADDRESS: coordinator:50051

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    volumes:
      - ../grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3001:3000"

  otel-collector:
    image: otel/opentelemetry-collector:0.106.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../otel/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
