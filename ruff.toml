line-length = 88
target-version = "py310"
include = [
    "python/src/**/*.py",
    "python/tests/**/*.py",
    "tests/**/*.py",
]
extend-exclude = [
    "tests/baseline",
]

[lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101"]
"python/tests/**/*.py" = ["S101"]
