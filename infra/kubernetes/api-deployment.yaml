apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: fl-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: fl-platform/api:milestone
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: fl-platform-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: fl-platform
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
